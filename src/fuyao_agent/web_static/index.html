<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Fuyao Agent Console</title>
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body>
    <div class="app-shell">
      <aside class="rail" aria-label="主导航">
        <div class="brand">
          <div class="brand-mark" aria-hidden="true">FY</div>
          <div>
            <strong>Fuyao Console</strong>
            <span>MCP market agent</span>
          </div>
        </div>

        <nav class="nav-list">
          <button class="nav-item active" type="button" data-view-target="chat">
            <span aria-hidden="true">01</span>问答
          </button>
          <button class="nav-item" type="button" data-view-target="tools">
            <span aria-hidden="true">02</span>工具
          </button>
          <button class="nav-item" type="button" data-view-target="memory">
            <span aria-hidden="true">03</span>记忆
          </button>
          <button class="nav-item" type="button" data-view-target="knowledge">
            <span aria-hidden="true">04</span>知识
          </button>
          <button class="nav-item" type="button" data-view-target="neutrality">
            <span aria-hidden="true">05</span>中性检查
          </button>
        </nav>

        <div class="rail-status">
          <div class="status-dot" id="statusDot" aria-hidden="true"></div>
          <div>
            <strong id="statusTitle">检查中</strong>
            <span id="statusDetail">读取本地配置</span>
          </div>
        </div>
      </aside>

      <main class="workspace">
        <header class="topbar">
          <div class="ticker-strip" aria-label="工作流概览">
            <span>Meta</span>
            <span>A-share</span>
            <span>Index</span>
            <span>Forecast</span>
            <span>Review</span>
          </div>
          <button class="icon-button" type="button" id="refreshStatus" title="刷新状态" aria-label="刷新状态">↻</button>
        </header>

        <section class="view active" id="view-chat" aria-labelledby="chatTitle">
          <div class="view-heading">
            <div>
              <p class="eyebrow">Agent Run</p>
              <h1 id="chatTitle">金融数据问答台</h1>
            </div>
            <div class="run-metrics" aria-label="运行指标">
              <div><span id="metricTools">0</span><small>工具调用</small></div>
              <div><span id="metricMemory">未写入</span><small>记忆状态</small></div>
            </div>
          </div>

          <div class="chat-layout">
            <form class="query-panel" id="askForm">
              <div class="control-grid">
                <label>
                  <span>工作流</span>
                  <select id="workflowSelect">
                    <option value="">通用问答</option>
                  </select>
                </label>
                <label>
                  <span>工具轮次</span>
                  <input id="maxToolRounds" type="number" min="1" max="20" value="8">
                </label>
                <label>
                  <span>复盘记录</span>
                  <input id="pendingLimit" type="number" min="1" max="200" value="20">
                </label>
                <label class="toggle-row">
                  <input id="noMemory" type="checkbox">
                  <span>禁用记忆</span>
                </label>
              </div>

              <textarea id="questionInput" rows="6" placeholder="输入需要查询或分析的 A 股问题"></textarea>

              <div class="prompt-row">
                <button class="chip-button" type="button" data-prompt="查一下贵州茅台今天的行情，并说明数据时间">个股行情</button>
                <button class="chip-button" type="button" data-workflow="market-movers" data-prompt="看最近一个交易日的市场异动">市场异动</button>
                <button class="chip-button" type="button" data-workflow="daily-forecast" data-prompt="">每日预测</button>
              </div>

              <div class="action-row">
                <button class="primary-button" type="submit" id="askButton">运行</button>
                <button class="ghost-button" type="button" id="clearAnswer">清空</button>
                <span class="run-state" id="runState">待命</span>
              </div>
            </form>

            <aside class="tool-panel" aria-label="工具调用记录">
              <div class="panel-heading">
                <h2>调用链</h2>
                <span id="observationCount">0</span>
              </div>
              <div class="observation-list" id="observationList">
                <p class="empty-state">暂无工具调用</p>
              </div>
            </aside>
          </div>

          <article class="answer-panel" id="answerPanel" aria-live="polite">
            <p class="empty-state">运行结果会显示在这里。</p>
          </article>
        </section>

        <section class="view" id="view-tools" aria-labelledby="toolsTitle">
          <div class="view-heading">
            <div>
              <p class="eyebrow">MCP Tools</p>
              <h1 id="toolsTitle">工具目录</h1>
            </div>
            <button class="primary-button" type="button" id="refreshTools">刷新工具</button>
          </div>
          <div class="filter-row">
            <input id="toolFilter" type="search" placeholder="按工具名、服务或描述筛选">
          </div>
          <div class="tool-list" id="toolList">
            <p class="empty-state">等待加载工具。</p>
          </div>
        </section>

        <section class="view" id="view-memory" aria-labelledby="memoryTitle">
          <div class="view-heading">
            <div>
              <p class="eyebrow">SQLite Memory</p>
              <h1 id="memoryTitle">预测与复盘记忆</h1>
            </div>
            <button class="primary-button" type="button" id="refreshMemory">刷新记忆</button>
          </div>
          <div class="stats-grid" id="memoryStats"></div>
          <div class="table-panel">
            <div class="panel-heading">
              <h2>待复盘预测</h2>
              <span id="pendingCount">0</span>
            </div>
            <div class="table-scroll">
              <table>
                <thead>
                  <tr>
                    <th>ID</th>
                    <th>对象</th>
                    <th>指标</th>
                    <th>方向</th>
                    <th>置信度</th>
                    <th>验证条件</th>
                  </tr>
                </thead>
                <tbody id="pendingTable"></tbody>
              </table>
            </div>
          </div>
        </section>

        <section class="view" id="view-knowledge" aria-labelledby="knowledgeTitle">
          <div class="view-heading">
            <div>
              <p class="eyebrow">Knowledge Base</p>
              <h1 id="knowledgeTitle">量化知识注入</h1>
            </div>
            <button class="primary-button" type="button" id="refreshKnowledge">刷新知识</button>
          </div>
          <pre class="text-surface" id="knowledgeText">等待加载知识库。</pre>
        </section>

        <section class="view" id="view-neutrality" aria-labelledby="neutralityTitle">
          <div class="view-heading">
            <div>
              <p class="eyebrow">Language Guard</p>
              <h1 id="neutralityTitle">中性措辞检查</h1>
            </div>
            <button class="primary-button" type="button" id="runNeutrality">检查文本</button>
          </div>
          <textarea id="neutralityInput" class="wide-textarea" rows="8" placeholder="粘贴需要检查的分析文本"></textarea>
          <div class="finding-list" id="neutralityResult">
            <p class="empty-state">检查结果会显示在这里。</p>
          </div>
        </section>
      </main>
    </div>

    <script src="/app.js"></script>
  </body>
</html>
